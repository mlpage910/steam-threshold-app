name: Static fallback (GitHub Pages)

# Builds and publishes the read-only static fallback to GitHub Pages.
# The real interactive app lives on Streamlit Community Cloud — this workflow
# exists so that (a) the repo always has a public surface even if Streamlit
# Cloud is down, and (b) every commit produces a deterministic snapshot of
# the default cohort with figures.
#
# If no scrape CSVs are committed under data/, the build emits a placeholder
# page that explains how to populate it locally. The CSVs are gitignored by
# default — see README.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build static site
        run: python scripts/build_static.py

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
